name: Deploy Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Upload dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/**"
          target: "/home/${{ secrets.EC2_USER }}/flowfin-client-dist"
          strip_components: 1
          rm: true

      - name: Deploy dist and reload Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            echo "1. Sync frontend files"
            sudo mkdir -p /var/www/flowfin
            sudo rsync -a --delete /home/${USER}/flowfin-client-dist/ /var/www/flowfin/

            echo "2. Fix ownership"
            sudo chown -R www-data:www-data /var/www/flowfin

            echo "3. Test Nginx config"
            sudo nginx -t

            echo "4. Reload Nginx"
            sudo systemctl reload nginx

            echo "5. Check frontend"
            curl -fsS https://flowfin.kr > /dev/null

            echo "Frontend deploy completed"